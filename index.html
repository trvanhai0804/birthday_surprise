<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday!</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        min-height: 100vh;
        background: linear-gradient(135deg, #0070c0, #8e44ad, #ff6b81);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        color: white;
    }

    .card {
        width: 90%;
        max-width: 650px;
        padding: 45px 35px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.16);
        backdrop-filter: blur(14px);
        text-align: center;
        box-shadow: 0 25px 60px rgba(0,0,0,0.25);
        z-index: 10;
        animation: popIn 1s ease;
    }

    h1 {
        font-size: 48px;
        margin-bottom: 15px;
        animation: bounce 1.5s infinite;
    }

    .name {
        font-size: 36px;
        font-weight: 700;
        color: #fff700;
        margin-bottom: 20px;
    }

    p {
        font-size: 20px;
        line-height: 1.5;
        margin-bottom: 25px;
    }

    button {
        padding: 15px 30px;
        border: none;
        border-radius: 999px;
        background: #fff;
        color: #0070c0;
        font-size: 20px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.08);
        background: #fff700;
    }

    .hidden {
        display: none;
    }

    .emoji {
        position: absolute;
        font-size: 34px;
        animation: floatUp 6s linear infinite;
        opacity: 0.9;
    }

    .confetti {
        position: absolute;
        width: 10px;
        height: 18px;
        background: yellow;
        animation: fall 4s linear infinite;
    }

    @keyframes popIn {
        from {
            transform: scale(0.6);
            opacity: 0;
        }
        to {
            transform: scale(1);
            opacity: 1;
        }
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
    }

    @keyframes floatUp {
        from {
            transform: translateY(110vh) rotate(0deg);
            opacity: 1;
        }
        to {
            transform: translateY(-20vh) rotate(360deg);
            opacity: 0;
        }
    }

    @keyframes fall {
        from {
            transform: translateY(-20px) rotate(0deg);
            opacity: 1;
        }
        to {
            transform: translateY(110vh) rotate(720deg);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<div class="card" id="startCard">
    <h1>🎁 Surprise!</h1>
    <p>Someone sent you a special birthday message.</p>
    <button onclick="startSurprise()">Click to Open 🎂</button>
</div>

<div class="card hidden" id="birthdayCard">
    <h1>🎉 Happy Birthday! 🎉</h1>
    <div class="name">Shival</div>
    <p>
        Wishing you a day full of happiness, laughter, good food,  
        and many funny moments with your team! 🥳
    </p>
    <p>
        May this year bring you more success, more energy,  
        and fewer Excel/Power BI bugs! 😆
    </p>
</div>

<audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
    function startSurprise() {
        document.getElementById("startCard").classList.add("hidden");
        document.getElementById("birthdayCard").classList.remove("hidden");

        const music = document.getElementById("music");
        music.volume = 0.35;
        music.play();

        createEmojis();
        createConfetti();
    }

    function createEmojis() {
        const emojis = ["🎂", "🎉", "🎈", "🥳", "🎁", "😂", "🍰"];

        setInterval(() => {
            const emoji = document.createElement("div");
            emoji.className = "emoji";
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + "vw";
            emoji.style.animationDuration = (4 + Math.random() * 4) + "s";
            document.body.appendChild(emoji);

            setTimeout(() => emoji.remove(), 7000);
        }, 400);
    }

    function createConfetti() {
        const colors = ["#fff700", "#ff4d6d", "#00e5ff", "#7cff6b", "#ffffff", "#ff9f1c"];

        setInterval(() => {
            for (let i = 0; i < 10; i++) {
                const confetti = document.createElement("div");
                confetti.className = "confetti";
                confetti.style.left = Math.random() * 100 + "vw";
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (2 + Math.random() * 3) + "s";
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 5000);
            }
        }, 300);
    }
</script>

</body>
</html>
